braintrust:
  project_name: load-testing-project
  api_url: https://api.braintrust.dev

functionaltest:
  run: True # Whether or not to run this test
  name_prefix: functional-test # Prefix used when creating test resources

evaltest:
  run: True # Whether or not to run this test
  project_id: null # if null or blank, will create a new project with name above
  name: test-large #Name for this eval
  trial_count: 1 # Number of times to run the eval
  dataset:
    name: test-large-dataset
    description: A large test dataset for conducting a load test of a large eval
    size: 100 # Number of rows to populate in dataset
    flush_batch_size: 25 # How many events to write to Braintrust at a time

loadtest:
  run: True # Whether or not to run this test
  locustfile_path: loadtest/run.py # Only modify if you change the file name or path for whatever reason
  headless: False # Run the test without the web UI. This will log stats periodically to console
  web_ui_port: 8089 # Port at which to run the locust UI on localhost. Only modify if you already have a service running on the default
  processes: 4 # Number of worker processes to spawn (logical CPUs)
  connection_pool_size: 10 # Pool size for draining logs to BT. Default 10
  braintrust_logger:
    flush_size: 100 # Sets BRAINTRUST_DEFAULT_BATCH_SIZE. Maximum number of log messages per network request. Default 100
    queue_size: 25000 # Sets BRAINTRUST_QUEUE_SIZE. Maximum logging queue size. Additional logs drop oldest elements. Default 25k
  params:
    faker_pool_size: 20 # Number of faker responses to pre-generate
    max_tokens: 1000 # Larger value simulates larger LLM responses. ~100k tokens generates spans ranging in 100-250Kb
    peak_concurrency: 20 # Number of users at peak load
    ramp_up: 2 # new users spawned per second
    run_time: 1m #e.g. 20s, 3m, 2h, 1h20m, 3h30m10s, etc.
    wait_time:  #amount of time to wait between simulating a new request from a user (a value is chosen at random bw the bounds)
      min: 5
      max: 10
    read_traffic:
      peak_concurrency: 2 # Keep low to stay under the 20 calls/min BTQL rate limit
      btql_calls_per_min: 10 # Global BTQL rate limit (across users)
  logs:
    html: True
    csv: False
    json: False
